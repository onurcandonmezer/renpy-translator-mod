<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', 'DejaVu Sans', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="dialogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="translationBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background - visual novel scene mockup -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle scene elements -->
  <circle cx="650" cy="80" r="40" fill="#ffffff08"/>
  <circle cx="660" cy="75" r="35" fill="#ffffff05"/>

  <!-- Stars -->
  <circle cx="100" cy="60" r="1.5" fill="#ffffff40"/>
  <circle cx="250" cy="30" r="1" fill="#ffffff30"/>
  <circle cx="400" cy="50" r="1.5" fill="#ffffff25"/>
  <circle cx="550" cy="70" r="1" fill="#ffffff35"/>
  <circle cx="700" cy="40" r="1.5" fill="#ffffff20"/>
  <circle cx="150" cy="100" r="1" fill="#ffffff30"/>
  <circle cx="350" cy="85" r="1" fill="#ffffff20"/>
  <circle cx="500" cy="25" r="1.5" fill="#ffffff25"/>

  <!-- Character silhouette -->
  <ellipse cx="400" cy="240" rx="60" ry="80" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <circle cx="400" cy="150" r="35" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>

  <!-- Settings gear button (top right) -->
  <g transform="translate(755, 25)" filter="url(#shadow)">
    <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#33333300"/>
    <text x="0" y="7" text-anchor="middle" font-size="24" fill="#ccccccaa">&#x2699;</text>
  </g>

  <!-- Translation overlay panel -->
  <g transform="translate(400, 270)" filter="url(#shadow)">
    <rect x="-320" y="-35" width="640" height="75" rx="8" fill="url(#translationBg)" stroke="#333333" stroke-width="1"/>

    <!-- Speaker name -->
    <text x="-300" y="-12" font-size="16" font-weight="bold" fill="#ffcc44">Sakura</text>

    <!-- Translated text with word highlights -->
    <text y="18" font-size="18" fill="#ffffff" x="-300">
      <tspan fill="#88ddaa">Merhaba</tspan><tspan>,</tspan>
      <tspan dx="4">bugun</tspan>
      <tspan dx="4" fill="#88ddaa">hava</tspan>
      <tspan dx="4">cok</tspan>
      <tspan dx="4">guzel</tspan>
      <tspan dx="4">degil</tspan>
      <tspan dx="4">mi?</tspan>
    </text>

    <!-- Saved word indicator -->
    <text x="295" y="-12" text-anchor="end" font-size="10" fill="#88ddaa80">&#x25CF; saved words</text>
  </g>

  <!-- Main dialogue box -->
  <g transform="translate(400, 400)" filter="url(#shadow)">
    <rect x="-370" y="-40" width="740" height="90" rx="6" fill="url(#dialogBg)" stroke="#334155" stroke-width="1"/>

    <!-- Speaker name in dialogue -->
    <text x="-345" y="-15" font-size="17" font-weight="bold" fill="#e8a0bf">Sakura</text>

    <!-- Original Japanese text -->
    <text x="-345" y="15" font-size="18" fill="#d4d4d8">&#x3053;&#x3093;&#x306B;&#x3061;&#x306F;&#x3001;&#x4ECA;&#x65E5;&#x306F;&#x3044;&#x3044;&#x5929;&#x6C17;&#x3067;&#x3059;&#x306D;&#xFF1F;</text>

    <!-- Text continue indicator -->
    <polygon points="345,28 355,28 350,35" fill="#ffffff40">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- TR Button -->
  <g transform="translate(745, 370)" filter="url(#shadow)">
    <rect x="-22" y="-15" width="44" height="30" rx="4" fill="#2a7a2acc" stroke="#44cc4444" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">TR</text>
  </g>

  <!-- Auto + Reset buttons -->
  <g transform="translate(730, 410)" filter="url(#shadow)">
    <!-- Auto button (active/green) -->
    <rect x="-12" y="-10" width="24" height="20" rx="4" fill="#2a7a2acc"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="bold" fill="#44cc44">A</text>

    <!-- Reset button -->
    <rect x="18" y="-10" width="24" height="20" rx="4" fill="#333333cc"/>
    <text x="30" y="5" text-anchor="middle" font-size="13" fill="#cc8844">&#x21BB;</text>
  </g>

  <!-- Title/branding bar -->
  <g transform="translate(400, 478)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#ffffff30" letter-spacing="2">
      REN'PY UNIVERSAL TRANSLATOR MOD
    </text>
  </g>

  <!-- Feature callouts -->
  <!-- Arrow to TR button -->
  <g transform="translate(640, 355)">
    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="#2a7a2a88" stroke="#44cc4466" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#88ee88">Click or press T</text>
    <line x1="55" y1="0" x2="80" y2="12" stroke="#44cc4466" stroke-width="1"/>
  </g>

  <!-- Arrow to translation panel -->
  <g transform="translate(130, 245)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#ffcc4422" stroke="#ffcc4444" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#ffcc44aa">Translation overlay</text>
  </g>

  <!-- Arrow to gear -->
  <g transform="translate(680, 28)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#ffffff11" stroke="#ffffff22" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#ffffff66">Settings</text>
    <line x1="35" y1="0" x2="55" y2="0" stroke="#ffffff22" stroke-width="1"/>
  </g>

  <!-- Language badges at bottom-left -->
  <g transform="translate(20, 478)">
    <text x="0" y="0" font-size="10" fill="#ffffff20">JP &#x2192; TR  |  28 languages  |  Gemini / DeepL / OpenAI</text>
  </g>
</svg>
